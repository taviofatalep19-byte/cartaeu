<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Carta</title>

<style>
    body{
        font-family: 'Times New Roman', serif;
        background:#e5e5e5;
        display:flex;
        justify-content:center;
        padding:50px;
    }

    .folha{
        background:white;
        width:700px;
        min-height:900px;
        padding:80px;
        box-shadow:0 0 15px rgba(0,0,0,0.2);
        line-height:1.8;
        font-size:22px;
    }

    .data{
        text-align:right;
        margin-bottom:50px;
    }

    .assinatura{
        margin-top:80px;
    }
</style>
</head>
<body>

<div class="folha">
    <div class="data">Tijucas - SC, 17 de abril de 2026</div>

    <p><strong>De:</strong> Otávio</p>

    <p>Olá,</p>

    <p>
        Venho nesta carta dizer que o livro de Fiódor Dostoiévski,
        "Crime e Castigo", foi o melhor livro que li em minha vida.
        Quero ser policial e gosto de computador.
    </p>

    <p>
        Deus abençoe todos, e que Nossa Senhora auxilie sempre.
    </p>

    <div class="assinatura">
        <p>Atenciosamente,</p>
        <p>Otávio</p>
    </div>
</div>

</body>
</html>
